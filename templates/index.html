<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CodeAlive</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Syne:wght@600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #0e1014;
        --editor-bg: #0a0c0f;
        --bar-bg: #0e1014;
        --border: #1e2127;
        --accent: #3fe0a0;
        --accent-dim: #1a6648;
        --text: #d4d8e0;
        --muted: #454952;
        --ln-text: #2e3238;
        --ln-width: 52px;
        --bar-height: 52px;
      }

      html,
      body {
        height: 100%;
        overflow: hidden;
        background: var(--bg);
        color: var(--text);
        font-family: "JetBrains Mono", monospace;
      }

      /* ── TOP BAR ─────────────────────────────────────────── */
      #topbar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: var(--bar-height);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 20px;
        background: var(--bar-bg);
        border-bottom: 1px solid var(--border);
        z-index: 100;
      }

      .logo {
        font-family: "Syne", sans-serif;
        font-weight: 700;
        font-size: 17px;
        letter-spacing: 0.03em;
        color: var(--accent);
        user-select: none;
      }

      .logo span {
        color: var(--muted);
        font-weight: 600;
      }

      .bar-center {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 11.5px;
        color: var(--muted);
      }

      .bar-center .dot {
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: var(--muted);
        opacity: 0.4;
      }

      #lineInfo {
        font-size: 11.5px;
      }

      .bar-right {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 7px 16px;
        border-radius: 5px;
        font-family: "JetBrains Mono", monospace;
        font-size: 12px;
        font-weight: 500;
        cursor: pointer;
        border: 1px solid transparent;
        transition:
          background 0.15s,
          border-color 0.15s,
          color 0.15s;
        letter-spacing: 0.02em;
      }

      .btn-ghost {
        background: transparent;
        border-color: var(--border);
        color: var(--muted);
      }
      .btn-ghost:hover {
        border-color: var(--muted);
        color: var(--text);
      }

      .btn-accent {
        background: var(--accent);
        color: #050c08;
        font-weight: 600;
      }
      .btn-accent:hover {
        background: #5aebaf;
      }
      .btn-accent:active {
        background: #2cc885;
      }

      .btn-accent:disabled {
        background: var(--accent-dim);
        color: #1a4034;
        cursor: not-allowed;
      }

      /* ── EDITOR AREA ─────────────────────────────────────── */
      #editor-wrap {
        position: fixed;
        top: var(--bar-height);
        left: 0;
        right: 0;
        bottom: 0;
        display: flex;
      }

      #line-numbers {
        width: var(--ln-width);
        overflow: hidden;
        background: var(--editor-bg);
        border-right: 1px solid var(--border);
        padding-top: 18px;
        flex-shrink: 0;
        user-select: none;
      }

      #line-numbers span {
        display: block;
        text-align: right;
        padding-right: 14px;
        font-size: 13px;
        line-height: 22px;
        color: var(--ln-text);
        transition: color 0.1s;
      }
      #line-numbers span.active {
        color: var(--muted);
      }

      #codeArea {
        flex: 1;
        background: var(--editor-bg);
        color: var(--text);
        font-family: "JetBrains Mono", monospace;
        font-size: 13.5px;
        line-height: 22px;
        padding: 18px 20px 40px 18px;
        border: none;
        outline: none;
        resize: none;
        tab-size: 2;
        white-space: pre;
        overflow-wrap: normal;
        overflow-x: auto;
        overflow-y: auto;
        caret-color: var(--accent);
      }

      #codeArea::placeholder {
        color: #1e2328;
      }

      #codeArea::-webkit-scrollbar {
        width: 7px;
        height: 7px;
      }
      #codeArea::-webkit-scrollbar-track {
        background: transparent;
      }
      #codeArea::-webkit-scrollbar-thumb {
        background: #1e2430;
        border-radius: 4px;
      }

      /* ── SHARE OVERLAY (bottom center) ──────────────────── */
      #share-bar {
        position: fixed;
        bottom: 28px;
        left: 50%;
        transform: translateX(-50%) translateY(20px);
        background: #161a22;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 14px 18px;
        display: flex;
        align-items: center;
        gap: 12px;
        opacity: 0;
        pointer-events: none;
        transition:
          opacity 0.25s,
          transform 0.25s;
        z-index: 200;
        min-width: 360px;
        box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
      }

      #share-bar.visible {
        opacity: 1;
        pointer-events: all;
        transform: translateX(-50%) translateY(0);
      }

      #share-bar label {
        font-size: 11px;
        color: var(--muted);
        white-space: nowrap;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      #shareUrl {
        flex: 1;
        background: var(--editor-bg);
        border: 1px solid var(--border);
        border-radius: 5px;
        color: var(--accent);
        font-family: "JetBrains Mono", monospace;
        font-size: 13px;
        padding: 7px 10px;
        outline: none;
      }

      #copyBtn {
        padding: 7px 14px;
        font-size: 12px;
      }

      /* ── TOAST ───────────────────────────────────────────── */
      #toast {
        position: fixed;
        bottom: 28px;
        right: 28px;
        background: var(--accent);
        color: #050c08;
        font-size: 12px;
        font-weight: 600;
        padding: 9px 18px;
        border-radius: 6px;
        opacity: 0;
        pointer-events: none;
        transform: translateY(8px);
        transition:
          opacity 0.2s,
          transform 0.2s;
        z-index: 300;
      }
      #toast.show {
        opacity: 1;
        transform: translateY(0);
      }

      /* ── ERROR BAR ───────────────────────────────────────── */
      #error-bar {
        position: fixed;
        bottom: 28px;
        left: 50%;
        transform: translateX(-50%) translateY(20px);
        background: #1c1014;
        border: 1px solid #3a1520;
        border-radius: 8px;
        padding: 11px 20px;
        color: #f07575;
        font-size: 12.5px;
        opacity: 0;
        pointer-events: none;
        transition:
          opacity 0.25s,
          transform 0.25s;
        z-index: 200;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
      }
      #error-bar.visible {
        opacity: 1;
        pointer-events: all;
        transform: translateX(-50%) translateY(0);
      }

      /* ── VIEW MODE BADGE ─────────────────────────────────── */
      #view-badge {
        display: none;
        align-items: center;
        gap: 8px;
        font-size: 11.5px;
        color: var(--muted);
        background: #13161c;
        border: 1px solid var(--border);
        padding: 5px 12px;
        border-radius: 20px;
      }
      #view-badge.show {
        display: flex;
      }
      #view-badge .vdot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--accent);
      }

      #share-modal {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.6);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 500;
      }

      #share-modal.show {
        display: flex;
      }

      .modal-box {
        background: #161a22;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 22px;
        width: 420px;
      }

      .modal-box h3 {
        margin-bottom: 14px;
      }

      .url-row {
        display: flex;
        gap: 8px;
        margin-top: 6px;
        margin-bottom: 16px;
      }

      .url-row input {
        flex: 1;
        background: var(--editor-bg);
        border: 1px solid var(--border);
        color: var(--text);
        padding: 7px;
      }

      .modal-actions {
        display: flex;
        justify-content: flex-end;
        gap: 10px;
      }
    </style>
  </head>
  <body>
    <!-- inject encoded from Jinja2 backend -->
    <script>
      window.__ENCODED__ = "{{ encoded | default('') }}";
    </script>

    <!-- TOP BAR -->
    <header id="topbar">
      <div class="logo">Code<span>Alive</span></div>

      <div class="bar-center">
        <span id="lineInfo">0 lines</span>
        <div class="dot"></div>
        <span id="charInfo">0 chars</span>
      </div>

      <div class="bar-right">
        <div id="view-badge"><span class="vdot"></span>viewing</div>
        <button class="btn btn-ghost" id="newBtn">new</button>
        <button class="btn btn-accent" id="shareBtn">share →</button>
      </div>
    </header>

    <!-- EDITOR -->
    <div id="editor-wrap">
      <div id="line-numbers"></div>
      <textarea
        id="codeArea"
        spellcheck="false"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        placeholder="// paste your code here..."
      ></textarea>
    </div>

    <!-- SHARE BAR -->
    <div id="share-bar">
      <label>link</label>
      <input id="shareUrl" type="text" readonly />
      <button class="btn btn-accent" id="copyBtn">copy</button>
    </div>

    <div id="share-modal">
      <div class="modal-box">
        <h3>Share your code</h3>

        <label>Custom URL (optional)</label>
        <div class="url-row">
          <span>codealive.onrender.com/</span>
          <input
            id="customCode"
            type="text"
            maxlength="30"
            placeholder="my-code"
          />
        </div>

        <div class="modal-actions">
          <button id="cancelShare" class="btn btn-ghost">cancel</button>
          <button id="createShare" class="btn btn-accent">create link</button>
        </div>
      </div>
    </div>

    <!-- ERROR BAR -->
    <div id="error-bar" id="errorBar"></div>

    <!-- TOAST -->
    <div id="toast">Copied!</div>

    <script src="/static/main.js"></script>
  </body>
</html>
